<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Malta - Tourism Guide</title>
    <!-- Ajustado para 'style.css' conforme você organizou na sua pasta -->
    <link rel="stylesheet" href="style.css"> 
</head>
<body>

    <!-- Back button connected to your homepage -->
    <a href="index.html" class="back-btn">← Back</a>

    <header class="main-header">
        <h1>Discover Malta</h1>
        <p class="subtitle">The Heart of the Mediterranean</p>
    </header>

    <main class="container">
        <!-- The 'cards-grid' container activates your CSS columns -->
        <div class="cards-grid">
            
            <!-- CARD 1: CULTURE -->
            <a href="#" class="card-discreto">
                <div class="card-image-wrapper">
                    <!-- Replace 'culture.jpg' with your real image path later -->
                    <img src="culture.jpg" class="card-thumb" alt="Historical street in Valletta, Malta">
                </div>
                <div class="card-content">
                    <h2>Culture & History</h2>
                    <p>Explore stunning baroque churches, ancient walled cities, and the historic streets of Valletta.</p>
                </div>
            </a>

            <!-- CARD 2: TECH HUB / OPPORTUNITIES -->
            <a href="#" class="card-discreto">
                <div class="card-image-wrapper">
                    <!-- Replace 'tech.jpg' with your real image path later -->
                    <img src="tech.jpg" class="card-thumb" alt="Modern tech environment in Malta">
                </div>
                <div class="card-content">
                    <h2>IT Opportunities</h2>
                    <p>Malta is a booming Mediterranean technology hub, offering great career paths for developers.</p>
                </div>
            </a>

        </div>
    </main>

</body>
</html>
