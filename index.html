<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Malta | Mediterranean Experience</title>
<link href="https://googleapis.com" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#f6f0e7;font-family:'Poppins', sans-serif;color:#2b2b2b;}
header{width:100%;padding:70px 20px 40px;text-align:center;}
header h1{font-size:72px;font-family:'Playfair Display', serif;color:#8c6a43;}
.cards-container{width:90%;max-width:1300px;margin:auto;display:grid;grid-template-columns:repeat(auto-fit, minmax(320px, 1fr));gap:35px;padding-bottom:80px;}
.card{background:white;border-radius:25px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,0.10);transition:0.4s ease;display:flex;flex-direction:column;height:100%;}
.card:hover{transform:translateY(-10px);}
.card-img-wrapper{width:100%;height:260px;overflow:hidden;background:#eaeaea;}
.card-img-wrapper img{width:100%;height:100%;object-fit:cover;}
.card-content{padding:28px;display:flex;flex-direction:column;flex-grow:1;}
.card-content h2{font-size:30px;margin-bottom:15px;font-family:'Playfair Display', serif;color:#8c6a43;}
.card-content p{font-size:16px;line-height:1.8;color:#555;margin-bottom:20px;}
.btn{display:inline-block;margin-top:auto;padding:12px 28px;background:#8c6a43;color:white;text-decoration:none;border-radius:40px;font-size:14px;text-align:center;}
@media(max-width:768px){header h1{font-size:52px;}}
</style>
</head>
<body>
<header><h1>Malta</h1></header>
<section class="cards-container">
    <!-- Card 3 corrigido com giorgios.png -->
    <div class="card"><div class="card-img-wrapper"><img src="giorgios.png" alt="Gastronomy"></div><div class="card-content"><h2>Gastronomy</h2><p>...</p><a href="#" class="btn">View More</a></div></div>
</section>
</body>
</html>
