<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descubra Malta - Meu Portfólio</title>
    <!-- Certifique-se de que a pasta css e o arquivo estilo.css estão na mesma pasta que este arquivo -->
    <link rel="stylesheet" href="css/estilo.css"> 
</head>
<body>

    <!-- Botão de voltar que já está estilizado no seu CSS -->
    <a href="index.html" class="back-btn">← Voltar</a>

    <header class="main-header">
        <h1>Descubra Malta</h1>
        <p class="subtitle">O coração do Mediterrâneo</p>
    </header>

    <main class="container">
        <!-- Esse container "cards-grid" ativa as colunas do CSS -->
        <div class="cards-grid">
            
            <!-- CARD 1 -->
            <a href="#" class="card-discreto">
                <div class="card-image-wrapper">
                    <!-- Dica: substitua "sua-foto1.jpg" pelo caminho real da sua imagem -->
                    <img src="sua-foto1.jpg" class="card-thumb" alt="Foto de Malta">
                </div>
                <div class="card-content">
                    <h2>Cultura e História</h2>
                    <p>Explore as igrejas barrocas e as ruas históricas de Valletta.</p>
                </div>
            </a>

            <!-- CARD 2 -->
            <a href="#" class="card-discreto">
                <div class="card-image-wrapper">
                    <!-- Dica: substitua "sua-foto2.jpg" pelo caminho real da sua imagem -->
                    <img src="sua-foto2.jpg" class="card-thumb" alt="Foto de Malta">
                </div>
                <div class="card-content">
                    <h2>Oportunidades em TI</h2>
                    <p>Malta é um polo tecnológico crescente na Europa.</p>
                </div>
            </a>

        </div>
    </main>

</body>
</html>
