<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tourism - Explore Malta</title>
    <style>
        /* === ESTILOS BLINDADOS ANTI-CONFLITO === */
        * { margin: 0 !important; padding: 0 !important; box-sizing: border-box !important; }
        body { background-color: #fcf8f2 !important; color: #4a3f35 !important; font-family: 'Segoe UI', Georgia, serif !important; line-height: 1.6 !important; }
        .back-btn { position: fixed !important; top: 20px !important; left: 20px !important; background-color: #f4ece1 !important; border: 1px solid #e6dac8 !important; color: #4a3f35 !important; text-decoration: none !important; padding: 10px 18px !important; border-radius: 20px !important; z-index: 9999 !important; }
        .header-section { text-align: center !important; padding: 100px 20px 40px 20px !important; max-width: 800px !important; margin: 0 auto !important; }
        .header-section h1 { font-size: 2.5rem !important; color: #8c7864 !important; margin-bottom: 15px !important; }
        .main-container { max-width: 900px !important; margin: 0 auto !important; padding: 20px !important; }
        .destination-card { background-color: #f4ece1 !important; border: 1px solid #e6dac8 !important; border-radius: 12px !important; overflow: hidden !important; margin-bottom: 40px !important; display: flex !important; flex-direction: column !important; }
        
        /* CONSERTO DAS IMAGENS */
        .destination-image-wrapper { width: 100% !important; height: 250px !important; overflow: hidden !important; position: relative !important; }
        .destination-image-wrapper img { width: 100% !important; height: 100% !important; object-fit: cover !important; display: block !important; }
        
        .destination-info { padding: 30px !important; }
        .location-tag { display: inline-block !important; background-color: #dfcfbe !important; padding: 4px 12px !important; border-radius: 4px !important; margin-bottom: 15px !important; font-weight: bold !important; }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← Back to Home</a>
    <header class="header-section"><h1>Wonders of Malta</h1></header>
    <main class="main-container">
        <!-- Estrutura dos cards mantida conforme original -->
        <section class="destination-card">
            <div class="destination-image-wrapper"><img src="valeta.png" alt="Valletta"></div>
            <div class="destination-info"><h2>Valletta</h2><div class="location-tag">📍 Valletta</div><p>...</p></div>
        </section>
        <!-- Adicionar outros cards aqui com a estrutura acima -->
    </main>
</body>
</html>
