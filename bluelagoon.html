<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue Lagoon & Blue Grotto - Malta</title>
    <style>
        /* Configurações Globais e Reset Limpo */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Segoe UI', Georgia, serif; 
        }
        
        body { 
            background-color: #fcf8f2; 
            color: #4a3f35; 
            line-height: 1.6; 
        }

        /* Botão de Voltar */
        .back-btn { 
            position: fixed; 
            top: 20px; 
            left: 20px; 
            background-color: #f4ece1; 
            border: 1px solid #e6dac8; 
            color: #4a3f35; 
            text-decoration: none; 
            padding: 10px 18px; 
            border-radius: 20px; 
            font-size: 0.9rem; 
            z-index: 9999; 
            transition: background-color 0.2s ease;
        }
        
        .back-btn:hover {
            background-color: #e6dac8;
        }

        /* Cabeçalho */
        .header-section { 
            text-align: center; 
            padding: 100px 20px 40px 20px; 
            max-width: 800px; 
            margin: 0 auto; 
        }
        
        .header-section h1 { 
            font-size: 2.5rem; 
            color: #8c7864; 
            margin-bottom: 10px;
        }

        /* Container Principal */
        .main-container { 
            max-width: 1000px; 
            margin: 0 auto; 
            padding: 20px; 
        }

        /* Bloco de Conteúdo (Card Principal) */
        .showcase-block { 
            background-color: #f4ece1; 
            border: 1px solid #e6dac8; 
            border-radius: 12px; 
            padding: 30px; 
            margin-bottom: 40px; 
        }
        
        .showcase-block h2 {
            color: #8c7864;
            margin-bottom: 20px;
        }

        /* Grade de Imagens Responsiva */
        .image-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); 
            gap: 20px; 
        }

        /* Cards Individuais */
        .image-card {
            background-color: #fcf8f2;
            border: 1px solid #e6dac8;
            border-radius: 6px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .image-card img { 
            width: 100%; 
            height: 220px; 
            object-fit: cover; 
        }
        
        /* Ajuste fino para recortar o céu da foto 4 */
        .crop-sky { 
            object-position: center bottom; 
        }

        /* Legendas das Fotos */
        .image-caption { 
            padding: 15px; 
            font-size: 0.9rem; 
            color: #4a3f35;
            line-height: 1.5;
            flex-grow: 1;
        }

        .image-caption strong {
            color: #8c7864;
        }

        .image-caption .address-text {
            display: block;
            margin-top: 4px;
            font-size: 0.85rem;
            color: #5c5044; /* Contraste melhorado para leitura fácil */
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">← Back to Home</a>

    <header class="header-section">
        <h1>Aquatic Paradises</h1>
        <p>A journey through Malta's crystal lagoons.</p>
    </header>

    <main class="main-container">
        <section class="showcase-block">
            <h2>The Blue Lagoon</h2>
            
            <div class="image-grid">
                <!-- Card 1 -->
                <div class="image-card">
                    <img src="bluelagoon2.png" alt="Blue Lagoon View">
                    <div class="image-caption">The vibrant landscape</div>
                </div>
                
                <!-- Card 2 -->
                <div class="image-card">
                    <img src="lagoon5.png.jpg" alt="Blue Lagoon Cliffs">
                    <div class="image-caption">Scenic coastal cliffs</div>
                </div>
                
                <!-- Card 3: Imagem com recorte do céu e endereço integrados -->
                <div class="image-card">
                    <img src="bluelagoon4.jpg" class="crop-sky" alt="Blue Lagoon Location">
                    <div class="image-caption">
                        <strong>📍 Location:</strong> Comino Island, Malta
                        <span class="address-text">Triq Kemmuneti, Għajnsielem KMN 1040</span>
                    </div>
                </div>
            </div>
            
        </section>
    </main>

</body>
</html>
