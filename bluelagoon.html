<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue Lagoon & Blue Grotto - Malta</title>
    <style>
        /* CSS unificado e blindado para evitar conflitos */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', serif; }
        body { background-color: #fcf8f2; color: #4a3f35; line-height: 1.6; }
        .header-section { text-align: center; padding: 50px 20px; }
        .main-container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .info-card { background-color: #f4ece1; border: 1px solid #e6dac8; border-radius: 12px; margin-bottom: 30px; overflow: hidden; }
        .card-padding { padding: 20px; }
        /* Imagens sem cortes */
        .solo-image-wrapper img, .lagoon-image-wrapper img { width: 100% !important; height: auto !important; object-fit: contain !important; }
        .image-gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; padding: 20px; }
        .gallery-item img { width: 100% !important; height: 200px !important; object-fit: cover !important; }
        .item-caption { padding: 10px; text-align: center; background: #eee; font-size: 0.9rem; }
    </style>
</head>
<body>
    <header class="header-section"><h1>Aquatic Paradises</h1></header>
        <main class="main-container">
        <!-- SEÇÃO 1: BLUE LAGOON -->
        <section class="info-card">
            <!-- ADICIONADO ../ ANTES DA IMAGEM PRINCIPAL -->
            <div class="lagoon-image-wrapper"><img src="./bluelagoon2.png" alt="Blue Lagoon"></div>
            <div class="card-padding">
                <h2>The Blue Lagoon</h2>
                <p>Paradise pool with white sandy seafloor and cyan waters.</p>
            </div>
            
            <div class="image-gallery">
                <!-- ADICIONADO ../ ANTES DA BLUELAGOON3 -->
                <div class="gallery-item"><img src="./bluelagoon3.png" alt="Boats"><div class="item-caption">Crystal-clear currents</div></div>
                <!-- ADICIONADO ../ ANTES DA BLUELAGOON4 -->
                <div class="gallery-item"><img src="./bluelagoon4.jpg" alt="Coast"><div class="item-caption">Scenic coastal cliffs</div></div>
            </div>
        </section>

        <!-- SEÇÃO 2: BLUE GROTTO -->
        <section class="info-card">
            <!-- ADICIONADO ../ ANTES DA MALTATHEBLUEGROTTO -->
            <div class="solo-image-wrapper"><img src="./maltathebluegrotto.jpg" alt="Blue Grotto"></div>
            <div class="card-padding">
                <h2>The Blue Grotto</h2>
                <p>System of seven sea caves with a 30-meter main arch, famous for its phosphorescent blue glow.</p>
            </div>
        </section>
    </main>

</body>
</html>
